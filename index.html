<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy My Care Clinic Chatbot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Easy My Care Clinic bilingual chatbot">
      <header>
        <h1>Easy My Care Clinic Chatbot</h1>
        <p>Hindi + English clinic assistant with voice support</p>
      </header>

      <section class="controls" aria-label="chat controls">
        <label for="languageMode">Response language</label>
        <select id="languageMode">
          <option value="auto">Auto detect</option>
          <option value="en">English</option>
          <option value="hi">Hindi</option>
        </select>

        <label class="inline">
          <input type="checkbox" id="ttsEnabled" checked />
          Voice output
        </label>

        <button id="stopSpeech" type="button">Stop speech</button>
      </section>

      <section id="chat" class="chat" aria-live="polite" aria-label="conversation"></section>

      <p id="micStatus" class="status" role="status" aria-live="assertive">Microphone idle</p>

      <form id="chatForm" class="composer" autocomplete="off">
        <label for="userInput" class="sr-only">Type your message</label>
        <input
          id="userInput"
          type="text"
          placeholder="Ask about services / सेवाओं के बारे में पूछें"
          required
        />
        <button type="button" id="micBtn">🎤 Speak</button>
        <button type="submit">Send</button>
      </form>

      <p id="fallbackNote" class="note"></p>
    </main>

    <script type="module" src="/script.js"></script>
  </body>
</html>
